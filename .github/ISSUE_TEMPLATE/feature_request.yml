name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What feature would you like to see?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Why do you need this? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work? (optional)

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Curation (RSS/NewsAPI/story selection)
        - Scriptwriting (dialogue/personas)
        - Voice Production (TTS/audio)
        - Publishing (Buzzsprout/social/website)
        - Admin UI
        - Show Configuration
        - GitHub Actions / CI
        - Other
