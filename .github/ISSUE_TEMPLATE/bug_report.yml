name: Bug Report
description: Report a bug in PodBot
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Run `python orchestrator.py --show my-show --edition daily --dry-run`
        2. ...
    validations:
      required: true

  - type: textarea
    id: show-config
    attributes:
      label: Show Configuration
      description: Paste relevant parts of your show.json (redact any secrets)
      render: json

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, TTS provider(s) used
      placeholder: |
        - Python: 3.11
        - OS: Ubuntu 22.04
        - TTS: OpenAI (primary)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant log output
      render: text
