# ============================================================
# The Rough — Daily Golf Podcast
# ============================================================
# Manual trigger only (no cron yet).
# Add cron later by uncommenting the schedule block.
#
# Manual trigger: GitHub -> Actions -> The Rough -> Run workflow
# ============================================================

name: The Rough (Daily)

on:
  # schedule:
  #   - cron: '0 11 * * 1-5'    # 11:00 AM UTC = 6:00 AM EST (Daily)

  workflow_dispatch:
    inputs:
      edition:
        description: 'Which edition to produce'
        type: choice
        options: ['daily']
        default: 'daily'
      dry_run:
        description: 'Dry run (curation only, no audio or publishing)'
        type: boolean
        default: false
      skip_audio:
        description: 'Skip audio production (use existing file)'
        type: boolean
        default: false
      start_from:
        description: 'Resume from stage'
        type: choice
        options: ['curate', 'script', 'audio', 'publish']
        default: 'curate'
      episode_date:
        description: 'Override date YYYY-MM-DD (blank = today EST)'
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.11'

jobs:
  produce_episode:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    concurrency:
      group: the-rough-${{ inputs.edition || 'daily' }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - run: pip install -r requirements.txt

      - name: Create runtime directories
        run: mkdir -p outputs/the-rough/{briefs,scripts,audio} database/the-rough logs/the-rough data/the-rough assets website/the-rough

      # ── Restore persistent state ───────────────────────────────────────────
      - uses: actions/cache@v4
        with:
          path: database/the-rough/
          key: the-rough-story-memory-${{ github.run_number }}
          restore-keys: the-rough-story-memory-

      - uses: actions/cache@v4
        with:
          path: data/the-rough/injected_stories.json
          key: the-rough-injections-${{ github.run_number }}
          restore-keys: the-rough-injections-

      # ── Run pipeline ──────────────────────────────────────────────────────
      - name: Run The Rough ${{ inputs.edition || 'daily' }} pipeline
        env:
          EPISODE_EDITION:              ${{ inputs.edition || 'daily' }}
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          CARTESIA_API_KEY:             ${{ secrets.CARTESIA_API_KEY }}
          OPENAI_API_KEY:               ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY:           ${{ secrets.ELEVENLABS_API_KEY }}
          BUZZSPROUT_API_KEY:           ${{ secrets.BUZZSPROUT_API_KEY }}
          BUZZSPROUT_PODCAST_ID_THE_ROUGH: ${{ secrets.BUZZSPROUT_PODCAST_ID_THE_ROUGH }}
          NEWS_API_KEY:                 ${{ secrets.NEWS_API_KEY }}
          SLACK_WEBHOOK_URL:            ${{ secrets.SLACK_WEBHOOK_URL }}
          DRY_RUN:                      ${{ inputs.dry_run || 'false' }}
        run: |
          python orchestrator.py \
            --show the-rough \
            --edition ${{ inputs.edition || 'daily' }} \
            --start-from ${{ inputs.start_from || 'curate' }} \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }} \
            ${{ inputs.skip_audio == 'true' && '--skip-audio' || '' }} \
            ${{ inputs.episode_date != '' && format('--date {0}', inputs.episode_date) || '' }}

      # ── Commit website data ────────────────────────────────────────────────
      - name: Commit website data
        if: inputs.dry_run != 'true'
        run: |
          git config user.name  "The Rough Bot"
          git config user.email "bot@theroughpodcast.com"
          git add website/the-rough/episodes.json website/the-rough/feed.xml || true
          git diff --staged --quiet || \
            git commit -m "The Rough ${{ inputs.edition || 'daily' }} $(date +%Y-%m-%d)"
          git push || true

      # ── Artifacts ─────────────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: the-rough-${{ inputs.edition || 'daily' }}-${{ github.run_number }}
          path: |
            outputs/the-rough/briefs/
            outputs/the-rough/scripts/
            logs/the-rough/
          retention-days: 30

      # ── Slack ─────────────────────────────────────────────────────────────
      - name: Notify success
        if: success() && inputs.dry_run != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"✅ *The Rough* ⛳ Daily published — $(date +'%A %B %-d')\"}"
          fi

      - name: Notify failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"🚨 *The Rough* Daily FAILED — run #${{ github.run_number }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
