# ============================================================
# The Signal — Three-Daily Episode Production
# ============================================================
# Cron runs at the exact target publish times.
# cron-job.org fires workflow_dispatch at the same times as backup
# — if GitHub cron is delayed, the external trigger starts immediately.
#
# Morning edition: 12:00 PM UTC = 7:00 AM EST
# Midday edition:   6:00 PM UTC = 1:00 PM EST
# Evening edition: 10:30 PM UTC = 5:30 PM EST
#
# Concurrency group + dedup check prevent duplicate episodes.
#
# Manual trigger: GitHub → Actions → Daily Episodes → Run workflow
# ============================================================

name: Daily Episodes (Morning + Midday + Evening)

on:
  schedule:
    - cron: '0 12  * * 1-5'    # 12:00 PM UTC = 7:00 AM EST  (Morning)
    - cron: '0 18  * * 1-5'    # 6:00 PM UTC  = 1:00 PM EST  (Midday)
    - cron: '30 22 * * 1-5'    # 10:30 PM UTC = 5:30 PM EST (Evening)

  workflow_dispatch:
    inputs:
      edition:
        description: 'Which edition to produce'
        type: choice
        options: ['morning', 'midday', 'evening']
        default: 'morning'
      dry_run:
        description: 'Dry run (curation only, no audio or publishing)'
        type: boolean
        default: false
      skip_audio:
        description: 'Skip audio production (use existing file)'
        type: boolean
        default: false
      episode_date:
        description: 'Override date YYYY-MM-DD (blank = today EST)'
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.11'

jobs:
  produce_episode:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    # Prevent duplicate runs: if the early cron is still running when an
    # external workflow_dispatch fires, the second run queues (not cancels).
    concurrency:
      group: episode-${{ inputs.edition || github.event.schedule }}
      cancel-in-progress: false

    steps:
      # ── Detect edition from schedule or manual input ───────────────────────
      - name: Detect edition
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.edition }}" ]; then
            EDITION="${{ github.event.inputs.edition }}"
          else
            # Cron: 12 UTC = morning, 18 UTC = midday, 22 UTC = evening
            HOUR=$(date -u +%H | sed 's/^0//')
            if [ "$HOUR" -lt 15 ]; then
              EDITION="morning"
            elif [ "$HOUR" -lt 20 ]; then
              EDITION="midday"
            else
              EDITION="evening"
            fi
          fi
          echo "edition=$EDITION" >> $GITHUB_OUTPUT
          echo "🎙️  Edition: $EDITION"

      # ── Setup ─────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1
          ffprobe -version | head -1

      - run: pip install -r requirements.txt

      - name: Create runtime directories
        run: mkdir -p outputs/the-signal/{briefs,scripts,audio} database/the-signal logs/the-signal data/the-signal assets website/the-signal

      # ── Restore persistent state ───────────────────────────────────────────
      - uses: actions/cache@v4
        with:
          path: database/the-signal/
          key: the-signal-story-memory-${{ github.run_number }}
          restore-keys: the-signal-story-memory-

      - uses: actions/cache@v4
        with:
          path: data/the-signal/injected_stories.json
          key: the-signal-injections-${{ github.run_number }}
          restore-keys: the-signal-injections-

      # ── Check for duplicate episode ──────────────────────────────────────
      - name: Check for recent episode on Buzzsprout
        id: dedup
        if: inputs.dry_run != 'true'
        env:
          BUZZSPROUT_API_KEY: ${{ secrets.BUZZSPROUT_API_KEY }}
          BUZZSPROUT_PODCAST_ID: ${{ secrets.BUZZSPROUT_PODCAST_ID }}
        run: |
          RESPONSE=$(curl -s -H "Authorization: Token token=${BUZZSPROUT_API_KEY}" \
            "https://www.buzzsprout.com/api/${BUZZSPROUT_PODCAST_ID}/episodes.json")

          RECENT=$(python3 -c "
          import json, sys
          from datetime import datetime, timezone, timedelta
          data = json.loads(sys.stdin.read())
          threshold = datetime.now(timezone.utc) - timedelta(minutes=120)
          count = sum(1 for ep in data if ep.get('published_at') and datetime.fromisoformat(ep['published_at']) > threshold)
          print(count)
          " <<< "$RESPONSE")

          if [ "$RECENT" -gt 0 ]; then
            echo "⏭️  Skipping — $RECENT episode(s) published within last 120 minutes"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "✅ No recent episodes — proceeding with pipeline"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # ── Run pipeline ──────────────────────────────────────────────────────
      - name: Run ${{ steps.detect.outputs.edition }} pipeline
        if: steps.dedup.outputs.skip != 'true'
        env:
          EPISODE_EDITION:              ${{ steps.detect.outputs.edition }}
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          CARTESIA_API_KEY:             ${{ secrets.CARTESIA_API_KEY }}
          OPENAI_API_KEY:               ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY:           ${{ secrets.ELEVENLABS_API_KEY }}
          BUZZSPROUT_API_KEY:           ${{ secrets.BUZZSPROUT_API_KEY }}
          BUZZSPROUT_PODCAST_ID:        ${{ secrets.BUZZSPROUT_PODCAST_ID }}
          NEWS_API_KEY:                 ${{ secrets.NEWS_API_KEY }}
          SLACK_WEBHOOK_URL:            ${{ secrets.SLACK_WEBHOOK_URL }}
          TWITTER_API_KEY:              ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:           ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:         ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET:  ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          LINKEDIN_ACCESS_TOKEN:        ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID:           ${{ secrets.LINKEDIN_PERSON_ID }}
          AWS_ACCESS_KEY_ID:            ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:        ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET:                ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION:                   ${{ secrets.AWS_REGION }}
          PODCAST_WEBSITE_URL:          ${{ secrets.PODCAST_WEBSITE_URL }}
          DRY_RUN:                      ${{ inputs.dry_run || 'false' }}
        run: |
          python orchestrator.py \
            --show the-signal \
            --edition ${{ steps.detect.outputs.edition }} \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }} \
            ${{ inputs.skip_audio == 'true' && '--skip-audio' || '' }} \
            ${{ inputs.episode_date != '' && format('--date {0}', inputs.episode_date) || '' }}

      # ── Commit website data ────────────────────────────────────────────────
      - name: Commit website data
        if: inputs.dry_run != 'true' && steps.dedup.outputs.skip != 'true'
        run: |
          git config user.name  "The Signal Bot"
          git config user.email "bot@thesignalpodcast.com"
          git add website/the-signal/episodes.json website/the-signal/feed.xml || true
          git diff --staged --quiet || \
            git commit -m "${{ steps.detect.outputs.edition }} $(date +%Y-%m-%d)"
          git push || true

      # ── Artifacts ─────────────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: episode-${{ steps.detect.outputs.edition }}-${{ github.run_number }}
          path: |
            outputs/the-signal/briefs/
            outputs/the-signal/scripts/
            logs/the-signal/
          retention-days: 30

      # ── Slack ─────────────────────────────────────────────────────────────
      - name: Notify success
        if: success() && inputs.dry_run != 'true' && steps.dedup.outputs.skip != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          EDITION="${{ steps.detect.outputs.edition }}"
          ICONS="morning:🌅 midday:☀️ evening:🌆"
          ICON=$(echo "$ICONS" | tr ' ' '\n' | grep "^$EDITION:" | cut -d: -f2)
          ICON=${ICON:-🎙️}
          LABEL=$(echo "$EDITION" | sed 's/.*/\u&/')
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"✅ *The Signal* ${ICON} ${LABEL} published — $(date +'%A %B %-d')\"}"
          fi

      - name: Notify failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          EDITION="${{ steps.detect.outputs.edition }}"
          LABEL=$(echo "$EDITION" | sed 's/.*/\u&/')
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"🚨 *The Signal* ${LABEL} FAILED — run #${{ github.run_number }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
