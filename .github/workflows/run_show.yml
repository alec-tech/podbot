# ============================================================
# PodBot — Run Show Episode Pipeline
# ============================================================
# Generic workflow that produces an episode for any show.
# Trigger manually via workflow_dispatch with show + edition inputs.
# To schedule, uncomment the cron block below and set your times.
# ============================================================

name: Run Show

on:
  # schedule:
  #   - cron: '0 12 * * 1-5'   # Example: weekdays at 12:00 UTC

  workflow_dispatch:
    inputs:
      show:
        description: 'Show slug (e.g. example-show)'
        type: string
        required: true
      edition:
        description: 'Edition to produce (e.g. morning, daily)'
        type: string
        required: true
      dry_run:
        description: 'Dry run (curation only, no audio or publishing)'
        type: boolean
        default: false
      episode_date:
        description: 'Override date YYYY-MM-DD (blank = today EST)'
        type: string
        default: ''

env:
  PYTHON_VERSION: '3.11'

jobs:
  produce_episode:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    concurrency:
      group: episode-${{ inputs.show }}-${{ inputs.edition }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - run: pip install -r requirements.txt

      - name: Create runtime directories
        run: |
          SHOW="${{ inputs.show }}"
          mkdir -p outputs/$SHOW/{briefs,scripts,audio} database/$SHOW logs/$SHOW data/$SHOW assets website/$SHOW

      # ── Restore persistent state ───────────────────────────────────────────
      - uses: actions/cache@v4
        with:
          path: database/${{ inputs.show }}/
          key: ${{ inputs.show }}-story-memory-${{ github.run_number }}
          restore-keys: ${{ inputs.show }}-story-memory-

      - uses: actions/cache@v4
        with:
          path: data/${{ inputs.show }}/injected_stories.json
          key: ${{ inputs.show }}-injections-${{ github.run_number }}
          restore-keys: ${{ inputs.show }}-injections-

      # ── Run pipeline ──────────────────────────────────────────────────────
      - name: Run ${{ inputs.edition }} pipeline for ${{ inputs.show }}
        env:
          ANTHROPIC_API_KEY:            ${{ secrets.ANTHROPIC_API_KEY }}
          CARTESIA_API_KEY:             ${{ secrets.CARTESIA_API_KEY }}
          OPENAI_API_KEY:               ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY:           ${{ secrets.ELEVENLABS_API_KEY }}
          BUZZSPROUT_API_KEY:           ${{ secrets.BUZZSPROUT_API_KEY }}
          BUZZSPROUT_PODCAST_ID:        ${{ secrets.BUZZSPROUT_PODCAST_ID }}
          NEWS_API_KEY:                 ${{ secrets.NEWS_API_KEY }}
          SLACK_WEBHOOK_URL:            ${{ secrets.SLACK_WEBHOOK_URL }}
          TWITTER_API_KEY:              ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:           ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:         ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET:  ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          LINKEDIN_ACCESS_TOKEN:        ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_ID:           ${{ secrets.LINKEDIN_PERSON_ID }}
          AWS_ACCESS_KEY_ID:            ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:        ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_S3_BUCKET:                ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION:                   ${{ secrets.AWS_REGION }}
          PODCAST_WEBSITE_URL:          ${{ secrets.PODCAST_WEBSITE_URL }}
          DRY_RUN:                      ${{ inputs.dry_run || 'false' }}
        run: |
          python orchestrator.py \
            --show ${{ inputs.show }} \
            --edition ${{ inputs.edition }} \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }} \
            ${{ inputs.episode_date != '' && format('--date {0}', inputs.episode_date) || '' }}

      # ── Commit website data ────────────────────────────────────────────────
      - name: Commit website data
        if: inputs.dry_run != 'true'
        run: |
          SHOW="${{ inputs.show }}"
          git config user.name  "PodBot"
          git config user.email "bot@podbot.example.com"
          git add website/$SHOW/episodes.json website/$SHOW/feed.xml || true
          git diff --staged --quiet || \
            git commit -m "${{ inputs.edition }} $(date +%Y-%m-%d) [$SHOW]"
          git push || true

      # ── Artifacts ─────────────────────────────────────────────────────────
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.show }}-${{ inputs.edition }}-${{ github.run_number }}
          path: |
            outputs/${{ inputs.show }}/briefs/
            outputs/${{ inputs.show }}/scripts/
            logs/${{ inputs.show }}/
          retention-days: 30

      # ── Notifications ─────────────────────────────────────────────────────
      - name: Notify success
        if: success() && inputs.dry_run != 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"✅ *${{ inputs.show }}* ${{ inputs.edition }} published — $(date +'%A %B %-d')\"}"
          fi

      - name: Notify failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d "{\"text\":\"🚨 *${{ inputs.show }}* ${{ inputs.edition }} FAILED — run #${{ github.run_number }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
          fi
